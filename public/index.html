<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>AgentDock</title>

<!-- Fonts: Inter for UI, JetBrains Mono for code. Plex Mono is loaded for the Tweak. -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

<!-- Markdown + syntax highlight -->
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-dark.min.css" />
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>

<style>
  /* ────────────────────────────────────────────────────────────────────
     TOKENS
  ──────────────────────────────────────────────────────────────────── */
  :root {
    /* dark (default) */
    --bg:           #0b0d10;
    --bg-1:         #11141a;     /* card */
    --bg-2:         #161a21;     /* card-elevated */
    --bg-3:         #1a1f27;     /* hover */
    --line:         #1f2630;
    --line-soft:    #161b23;
    --text:         #e6e8eb;
    --text-dim:     #98a0ad;
    --text-faint:   #5b6573;
    --accent:       oklch(0.78 0.13 155);     /* muted green */
    --accent-soft:  oklch(0.78 0.13 155 / 0.14);
    --accent-line:  oklch(0.78 0.13 155 / 0.40);
    --warn:         oklch(0.78 0.13 70);      /* amber */
    --err:          oklch(0.68 0.18 25);      /* red  */

    --mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
    --sans: 'Inter', system-ui, -apple-system, Segoe UI, sans-serif;

    --read: 70ch;
    --radius: 10px;
    --radius-sm: 6px;

    --shadow: 0 1px 0 rgba(255,255,255,0.02) inset, 0 1px 2px rgba(0,0,0,0.5);
  }
  :root[data-theme="light"] {
    --bg:        #fafaf8;
    --bg-1:      #ffffff;
    --bg-2:      #f3f4f1;
    --bg-3:      #ebede9;
    --line:      #e2e4df;
    --line-soft: #ecede9;
    --text:      #15181c;
    --text-dim:  #5a626d;
    --text-faint:#8b94a0;
    --accent:       oklch(0.55 0.13 155);
    --accent-soft:  oklch(0.55 0.13 155 / 0.10);
    --accent-line:  oklch(0.55 0.13 155 / 0.35);
    --shadow: 0 1px 0 rgba(255,255,255,0.6) inset, 0 1px 2px rgba(0,0,0,0.05);
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  ::selection { background: var(--accent-soft); color: var(--text); }
  button { font-family: inherit; color: inherit; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }

  /* ────────────────────────────────────────────────────────────────────
     LAYOUT
  ──────────────────────────────────────────────────────────────────── */
  .app {
    display: grid;
    grid-template-rows: auto 1fr auto;
    grid-template-columns: 0fr 1fr;
    height: 100vh;
    transition: grid-template-columns 220ms ease;
  }
  .app[data-workspace="on"] { grid-template-columns: 280px 1fr; }

  .header {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 0 18px;
    height: 52px;
    border-bottom: 1px solid var(--line);
    background: linear-gradient(to bottom, var(--bg-1), var(--bg));
    position: relative;
    z-index: 5;
  }
  .brand {
    display: flex; align-items: center; gap: 10px;
    font-weight: 600; letter-spacing: -0.01em;
  }
  .brand-mark {
    width: 22px; height: 22px; border-radius: 6px;
    background:
      radial-gradient(circle at 30% 30%, var(--accent) 0%, transparent 60%),
      var(--bg-2);
    border: 1px solid var(--line);
    position: relative;
  }
  .brand-mark::after {
    content: ""; position: absolute; inset: 5px;
    border: 1.5px solid var(--text);
    border-radius: 3px;
    opacity: 0.85;
  }
  .meta {
    display: flex; align-items: center; gap: 14px;
    color: var(--text-dim);
    font-size: 12.5px;
  }
  .meta .pip {
    font-family: var(--mono);
    font-size: 12px;
    background: var(--bg-1);
    border: 1px solid var(--line);
    padding: 3px 8px;
    border-radius: 999px;
  }
  .health {
    display: inline-flex; align-items: center; gap: 6px;
  }
  .health-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 0 0 var(--accent);
    animation: pulse 2.4s ease-out infinite;
  }
  .health[data-state="warming"] .health-dot { background: var(--warn); }
  .health[data-state="error"] .health-dot   { background: var(--err); animation: none; }

  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 var(--accent-soft); }
    70%  { box-shadow: 0 0 0 8px transparent; }
    100% { box-shadow: 0 0 0 0 transparent; }
  }

  .header-spacer { flex: 1; }
  .header-actions { display: flex; gap: 6px; }
  .icon-btn, .ghost-btn {
    display: inline-flex; align-items: center; gap: 6px;
    background: transparent;
    color: var(--text-dim);
    border: 1px solid transparent;
    padding: 6px 10px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 12.5px;
    transition: all 120ms ease;
  }
  .icon-btn:hover, .ghost-btn:hover {
    background: var(--bg-1); color: var(--text); border-color: var(--line);
  }
  .icon-btn svg, .ghost-btn svg { width: 14px; height: 14px; }

  /* Workspace rail */
  .rail {
    grid-row: 2 / 4;
    border-right: 1px solid var(--line);
    background: var(--bg-1);
    overflow: hidden;
    display: flex; flex-direction: column;
    min-width: 0;
  }
  .app:not([data-workspace="on"]) .rail { border-right: 0; }
  .rail-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 14px;
    border-bottom: 1px solid var(--line-soft);
    color: var(--text-dim);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .rail-body { overflow: auto; padding: 8px 6px 12px; flex: 1; }
  .tree { font-family: var(--mono); font-size: 12.5px; }
  .tree-node {
    display: flex; align-items: center; gap: 6px;
    padding: 3px 8px;
    color: var(--text-dim);
    border-radius: 4px;
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }
  .tree-node:hover { background: var(--bg-2); color: var(--text); }
  .tree-node[data-touch="r"] .tree-name::after,
  .tree-node[data-touch="w"] .tree-name::after {
    content: ""; width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent); display: inline-block; margin-left: 8px;
    vertical-align: middle;
  }
  .tree-node[data-touch="w"] .tree-name::after { background: var(--warn); }
  .tree-caret { color: var(--text-faint); width: 10px; display: inline-block; }
  .tree-icon { color: var(--text-faint); }
  .tree-children { padding-left: 14px; }
  .tree-section {
    margin-top: 14px;
    padding: 0 12px 6px;
    color: var(--text-faint);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-family: var(--sans);
  }

  /* Main column */
  .main {
    grid-row: 2 / 3;
    overflow: hidden;
    display: flex; flex-direction: column;
    min-height: 0;
  }
  .scroll {
    flex: 1;
    overflow: auto;
    padding: 24px 24px 8px;
  }
  .scroll-inner {
    max-width: calc(var(--read) + 240px);
    margin: 0 auto;
  }

  /* Composer */
  .composer-wrap {
    grid-row: 3 / 4;
    border-top: 1px solid var(--line);
    background: linear-gradient(to top, var(--bg) 60%, transparent);
    padding: 12px 24px 18px;
  }
  .composer {
    max-width: calc(var(--read) + 240px);
    margin: 0 auto;
    background: var(--bg-1);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    transition: border-color 120ms ease, box-shadow 120ms ease;
  }
  .composer:focus-within {
    border-color: var(--accent-line);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  .composer textarea {
    width: 100%;
    min-height: 52px;
    max-height: 240px;
    resize: none;
    background: transparent;
    border: 0;
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.55;
    padding: 14px 16px 4px;
    outline: none;
  }
  .composer-bar {
    display: flex; align-items: center;
    padding: 6px 10px 8px 14px;
    color: var(--text-faint);
    font-size: 11.5px;
    gap: 12px;
  }
  .kbd {
    font-family: var(--mono); font-size: 11px;
    padding: 1px 5px;
    border: 1px solid var(--line);
    border-bottom-width: 2px;
    border-radius: 4px;
    color: var(--text-dim);
    background: var(--bg-2);
  }
  .composer-bar .right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
  .send {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--accent);
    color: #08110b;
    border: 0;
    border-radius: 6px;
    padding: 6px 12px;
    font-weight: 600;
    font-size: 12.5px;
    cursor: pointer;
    transition: filter 100ms ease, transform 100ms ease;
  }
  .send:hover { filter: brightness(1.06); }
  .send:active { transform: translateY(1px); }
  .send[disabled] { opacity: 0.45; cursor: not-allowed; }

  /* Token meter */
  .meter {
    display: inline-flex; align-items: center; gap: 6px;
    color: var(--text-faint); font-size: 11px; font-family: var(--mono);
  }
  .meter-bar {
    width: 64px; height: 4px; border-radius: 2px;
    background: var(--bg-2); overflow: hidden;
  }
  .meter-bar > i {
    display: block; height: 100%;
    background: var(--accent);
    transition: width 240ms ease;
  }

  /* ────────────────────────────────────────────────────────────────────
     EMPTY STATE
  ──────────────────────────────────────────────────────────────────── */
  .empty {
    margin: max(8vh, 32px) auto 0;
    max-width: 720px;
    text-align: center;
    color: var(--text-dim);
    animation: fadeIn 320ms ease;
  }
  .empty-mark {
    width: 48px; height: 48px; border-radius: 12px;
    margin: 0 auto 18px;
    background:
      radial-gradient(circle at 30% 30%, var(--accent) 0%, transparent 65%),
      var(--bg-1);
    border: 1px solid var(--line);
    position: relative;
  }
  .empty-mark::after {
    content: ""; position: absolute; inset: 11px;
    border: 1.5px solid var(--text);
    border-radius: 5px;
    opacity: 0.85;
  }
  .empty h1 {
    font-size: 22px; font-weight: 600; letter-spacing: -0.015em;
    color: var(--text); margin: 0 0 6px;
  }
  .empty p { margin: 0 0 28px; }
  .suggestions {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    text-align: left;
  }
  .suggestion {
    background: var(--bg-1);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 14px 14px 12px;
    cursor: pointer;
    transition: transform 120ms ease, border-color 120ms ease, background 120ms ease;
    color: var(--text);
    display: flex; flex-direction: column; gap: 8px;
    min-height: 96px;
  }
  .suggestion:hover {
    border-color: var(--accent-line);
    background: var(--bg-2);
    transform: translateY(-1px);
  }
  .suggestion .label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-faint);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .suggestion .body { font-size: 13.5px; line-height: 1.45; }
  .suggestion .arrow {
    margin-top: auto;
    align-self: flex-end;
    color: var(--text-faint);
    font-family: var(--mono);
  }
  .suggestion:hover .arrow { color: var(--accent); }
  .empty-foot {
    margin-top: 22px;
    color: var(--text-faint);
    font-size: 12px;
  }

  /* ────────────────────────────────────────────────────────────────────
     CONVERSATION
  ──────────────────────────────────────────────────────────────────── */
  .turn {
    margin: 18px auto;
    max-width: var(--read);
    animation: fadeIn 240ms ease;
  }
  .turn.full { max-width: calc(var(--read) + 200px); }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: none; }
  }
  .role {
    display: flex; align-items: center; gap: 8px;
    color: var(--text-faint); font-size: 11.5px;
    text-transform: uppercase; letter-spacing: 0.08em;
    margin-bottom: 8px;
  }
  .role .who { color: var(--text-dim); font-weight: 600; letter-spacing: 0.04em; }
  .role .time { font-family: var(--mono); font-size: 11px; }
  .role .spacer { flex: 1; }
  .role .actions { display: flex; gap: 4px; opacity: 0; transition: opacity 120ms ease; }
  .turn:hover .role .actions { opacity: 1; }

  .user-msg {
    background: var(--bg-1);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 12px 14px;
    color: var(--text);
    white-space: pre-wrap;
    font-size: 14px;
  }

  .assistant-msg .prose {
    color: var(--text);
    font-size: 14.5px;
    line-height: 1.65;
  }
  .prose p { margin: 0 0 12px; }
  .prose p:last-child { margin-bottom: 0; }
  .prose ul, .prose ol { margin: 0 0 12px; padding-left: 22px; }
  .prose li { margin: 2px 0; }
  .prose code {
    font-family: var(--mono);
    background: var(--bg-2);
    padding: 1px 5px;
    border-radius: 4px;
    font-size: 12.5px;
    border: 1px solid var(--line-soft);
  }
  .prose pre {
    background: var(--bg-1) !important;
    border: 1px solid var(--line);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    overflow: auto;
    margin: 0 0 12px;
  }
  .prose pre code {
    background: transparent !important;
    border: 0; padding: 0;
    font-size: 12.5px;
    line-height: 1.55;
  }
  .prose strong { color: var(--text); font-weight: 600; }
  .prose a { color: var(--accent); }
  .prose table { border-collapse: collapse; font-size: 13px; margin-bottom: 12px; }
  .prose th, .prose td { border: 1px solid var(--line); padding: 6px 10px; text-align: left; }

  /* Tool stack */
  .tool-stack {
    display: flex; flex-direction: column; gap: 6px;
    margin-bottom: 14px;
  }
  .tool {
    background: var(--bg-1);
    border: 1px solid var(--line);
    border-radius: var(--radius-sm);
    overflow: hidden;
    transition: border-color 120ms ease;
  }
  .tool:hover { border-color: #2a3340; }
  .tool-head {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px;
    cursor: pointer;
    user-select: none;
  }
  .tool-head:hover { background: var(--bg-2); }
  .tool-caret {
    width: 10px; color: var(--text-faint);
    transition: transform 160ms ease;
    font-family: var(--mono); font-size: 10px;
    text-align: center;
    line-height: 1;
  }
  .tool[data-open="true"] .tool-caret { transform: rotate(90deg); }
  .tool-status {
    width: 14px; height: 14px;
    display: inline-flex; align-items: center; justify-content: center;
    color: var(--accent);
    flex-shrink: 0;
  }
  .tool[data-status="error"] .tool-status { color: var(--err); }
  .tool[data-status="running"] .tool-status { color: var(--warn); }
  .tool-name {
    font-family: var(--mono); font-size: 12.5px; font-weight: 600;
    color: var(--text);
  }
  .tool-summary {
    font-family: var(--mono); font-size: 12.5px;
    color: var(--text-dim);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    flex: 1; min-width: 0;
  }
  .tool-summary .sep { color: var(--text-faint); margin: 0 6px; }
  .tool-meta {
    display: flex; align-items: center; gap: 10px;
    color: var(--text-faint);
    font-family: var(--mono); font-size: 11.5px;
    flex-shrink: 0;
  }
  .badge {
    padding: 1px 6px; border-radius: 999px;
    border: 1px solid var(--line);
    background: var(--bg-2);
  }
  .badge-ok    { color: var(--accent); border-color: var(--accent-line); background: var(--accent-soft); }
  .badge-fail  { color: var(--err); border-color: oklch(0.68 0.18 25 / 0.4); }

  .tool-body {
    border-top: 1px solid var(--line-soft);
    display: none;
    background: var(--bg);
  }
  .tool[data-open="true"] .tool-body { display: block; animation: expand 180ms ease; }
  @keyframes expand {
    from { opacity: 0; transform: translateY(-2px); }
    to   { opacity: 1; transform: none; }
  }

  .tool-section {
    padding: 10px 14px;
    border-bottom: 1px solid var(--line-soft);
  }
  .tool-section:last-child { border-bottom: 0; }
  .tool-section-label {
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-faint);
    margin-bottom: 6px;
    display: flex; align-items: center; gap: 8px;
  }
  .tool-section-label .tabs { margin-left: auto; display: flex; gap: 2px; }
  .tab {
    padding: 1px 8px; border-radius: 4px;
    background: transparent;
    color: var(--text-faint);
    border: 1px solid transparent;
    font-size: 10.5px; cursor: pointer;
    text-transform: uppercase; letter-spacing: 0.08em;
    font-family: var(--sans);
  }
  .tab[data-active="true"] {
    color: var(--text);
    background: var(--bg-2);
    border-color: var(--line);
  }
  .tool pre.code {
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.55;
    margin: 0;
    background: transparent;
    color: var(--text);
    overflow: auto;
    max-height: 360px;
    white-space: pre;
  }
  .tool pre.code .ln {
    display: inline-block;
    width: 28px;
    color: var(--text-faint);
    user-select: none;
    text-align: right;
    padding-right: 12px;
  }

  /* shell stdout / stderr */
  .stream { font-family: var(--mono); font-size: 12px; line-height: 1.5; }
  .stream .stderr { color: var(--err); }
  .stream .meta-row {
    display: flex; gap: 16px; margin-top: 6px;
    padding-top: 6px; border-top: 1px dashed var(--line-soft);
    color: var(--text-faint); font-size: 11px;
  }
  .stream .meta-row b { color: var(--text-dim); font-weight: 500; }

  /* list_files table */
  .files-table {
    width: 100%; border-collapse: collapse;
    font-family: var(--mono); font-size: 12.5px;
  }
  .files-table th {
    text-align: left; padding: 4px 8px;
    color: var(--text-faint); font-weight: 500;
    font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.08em;
    border-bottom: 1px solid var(--line-soft);
  }
  .files-table td {
    padding: 4px 8px;
    border-bottom: 1px solid var(--line-soft);
  }
  .files-table tr:last-child td { border-bottom: 0; }
  .files-table .name { color: var(--text); }
  .files-table .name.dir { color: var(--accent); }
  .files-table .size, .files-table .mod { color: var(--text-dim); }

  /* diff view */
  .diff { font-family: var(--mono); font-size: 12px; line-height: 1.55; }
  .diff .row { display: flex; }
  .diff .gut { width: 28px; flex-shrink: 0; text-align: right; padding-right: 12px; color: var(--text-faint); user-select: none; }
  .diff .add { background: oklch(0.78 0.13 155 / 0.10); color: #c8f7dc; }
  .diff .del { background: oklch(0.68 0.18 25 / 0.10); color: #f7c8c8; }
  .diff .ctx { color: var(--text-dim); }
  .diff .hunk { color: var(--text-faint); padding: 4px 0; font-style: italic; }

  /* In-flight / live ghost */
  .live {
    background: var(--bg-1);
    border: 1px dashed var(--line);
    border-radius: var(--radius);
    padding: 10px 12px;
  }
  .live-row {
    display: flex; align-items: center; gap: 10px;
    font-family: var(--mono); font-size: 12.5px;
    color: var(--text-dim);
    padding: 4px 0;
  }
  .live-row .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent);
    animation: softPulse 1.6s ease-in-out infinite;
  }
  .live-row[data-state="done"] .dot { background: var(--accent); animation: none; opacity: 0.7; }
  .live-row[data-state="running"] .dot { background: var(--warn); animation: softPulse 1.2s ease-in-out infinite; }
  .live-row .name { color: var(--text); font-weight: 600; }
  .live-row .summ { color: var(--text-dim); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .live-row .t { color: var(--text-faint); font-size: 11px; }
  @keyframes softPulse {
    0%, 100% { opacity: 0.4; transform: scale(0.85); }

  /* Error banner */
  .banner {
    position: fixed;

<script>
/* ============================================================
   AgentDock chat UI
   Single-file, vanilla JS. Mocked backend hits ./api/chat /
   ./health if available, falls back to a local fixture.
   ============================================================ */

// ---------- utilities ----------
const $  = (s, r=document) => r.querySelector(s);
const $$ = (s, r=document) => Array.from(r.querySelectorAll(s));
const el = (tag, attrs={}, ...kids) => {
  const n = document.createElement(tag);
  for (const [k,v] of Object.entries(attrs)) {
    if (k === 'class') n.className = v;
    else if (k === 'html') n.innerHTML = v;
    else if (k.startsWith('on')) n.addEventListener(k.slice(2), v);
    else if (v !== false && v != null) n.setAttribute(k, v);
  }
  for (const k of kids.flat()) {
    if (k == null) continue;
    n.append(k.nodeType ? k : document.createTextNode(k));
  }
  return n;
};
const fmtTime = (d=new Date()) => d.toTimeString().slice(0,5);
const fmtBytes = b => b<1024 ? b+' B' : b<1024*1024 ? (b/1024).toFixed(1)+' kB' : (b/1024/1024).toFixed(1)+' MB';
const escHtml = s => String(s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
const summarize = (name, args) => {
  if (!args) return '';
  if (name === 'shell')      return args.cmd || args.command || '';
  if (name === 'read_file')  return args.path || '';
  if (name === 'write_file') return args.path || '';
  if (name === 'list_files') return args.path || '';
  return JSON.stringify(args);
};

// marked + hljs
marked.setOptions({
  breaks: true,
  highlight: (code, lang) => {
    try {
      if (lang && hljs.getLanguage(lang)) return hljs.highlight(code, {language: lang}).value;
      return hljs.highlightAuto(code).value;
    } catch(e) { return escHtml(code); }
  }
});

// ---------- state ----------
const state = {
  messages: [],         // [{role, content, time, tools?: [...]}, ...]
  inflight: null,       // running turn descriptor
  model: 'claude-sonnet-4',
  sandbox: 'sbx_4f2a',
  health: 'ready',
  banner: null,
  tweaks: { workspace: true, read: 70, mono: 'JetBrains Mono' },
  tokens: 0,
  tokenBudget: 200_000,
};

// ---------- mock backend ----------
// Tries real endpoints first; on failure falls back to fixtures so the
// page is fully usable without a server.
const MOCK = {
  health: { ok: true, model: 'claude-sonnet-4' },
  responder(messages) {
    const last = (messages.filter(m => m.role==='user').at(-1)?.content || '').toLowerCase();

    if (/list|ls|files|workspace/.test(last)) {
      return {
        toolEvents: [
          { name: 'shell', args: { cmd: 'ls -la /workspace/openclaw' },
            result: { stdout:
`total 36
drwxr-xr-x  6 dev  dev   192 Apr 28 14:01 .
drwxr-xr-x  3 dev  dev    96 Apr 28 13:58 ..
-rw-r--r--  1 dev  dev   142 Apr 28 14:01 .gitignore
-rw-r--r--  1 dev  dev  1421 Apr 28 14:01 package.json
-rw-r--r--  1 dev  dev   612 Apr 28 14:01 README.md
drwxr-xr-x  4 dev  dev   128 Apr 28 14:01 src
-rw-r--r--  1 dev  dev   381 Apr 28 14:01 tsconfig.json`,
              stderr:'', exit_code: 0, ms: 84 } },
          { name: 'list_files', args: { path: '/workspace/openclaw' },
            result: { entries: [
              { name: 'src',          type: 'dir',  size: 0,    mtime: '2026-04-28 14:01' },
              { name: 'package.json', type: 'file', size: 1421, mtime: '2026-04-28 14:01' },
              { name: 'README.md',    type: 'file', size: 612,  mtime: '2026-04-28 14:01' },
              { name: 'tsconfig.json',type: 'file', size: 381,  mtime: '2026-04-28 14:01' },
              { name: '.gitignore',   type: 'file', size: 142,  mtime: '2026-04-28 14:01' }
            ], ms: 11 } }
        ],
        reply: `Here's what's in **/workspace/openclaw**:

- \`src/\` — source tree
- \`package.json\` — manifest (1.4 kB)
- \`README.md\` — short, points at \`pnpm dev\`
- \`tsconfig.json\`, \`.gitignore\`

Want me to read \`package.json\` or open \`src/\`?`
      };
    }

    if (/package\.json|scripts/.test(last)) {
      const pkg = `{
  "name": "openclaw",
  "version": "0.0.1",
  "private": true,
  "scripts": {
    "dev": "vite",
    "build": "vite build",
    "test": "vitest run",
    "lint": "eslint src"
  },
  "dependencies": {
    "react": "^18.3.1",
    "react-dom": "^18.3.1"
  },
  "devDependencies": {
    "vite": "^5.2.0",
    "vitest": "^1.6.0",
    "eslint": "^9.0.0",
    "typescript": "^5.4.0"
  }
}`;
      return {
        toolEvents: [
          { name: 'read_file', args: { path: '/workspace/openclaw/package.json' },
            result: { contents: pkg, lang: 'json', size: pkg.length, ms: 12 } }
        ],
        reply: `\`package.json\` has four scripts:

| script | command |
|---|---|
| \`dev\` | \`vite\` |
| \`build\` | \`vite build\` |
| \`test\` | \`vitest run\` |
| \`lint\` | \`eslint src\` |

The deps are React 18 + Vite 5 + Vitest 1. Want me to run \`pnpm test\`?`
      };
    }

    if (/hello|create|run|tsx|ts/.test(last)) {
      const before =
`// stub
console.log('todo');
`;
      const after =
`// hello.ts — written by AgentDock
const greet = (name: string) => \`hello, \${name}\`;
console.log(greet('agentdock'));
`;
      return {
        toolEvents: [
          { name: 'write_file', args: { path: '/workspace/openclaw/hello.ts' },
            result: { before, after, size: after.length, lang: 'typescript', ms: 8 } },
          { name: 'shell', args: { cmd: 'cd /workspace/openclaw && tsc hello.ts && node hello.js' },
            result: { stdout: 'hello, agentdock\n', stderr: '', exit_code: 0, ms: 612 } }
        ],
        reply: `Wrote \`hello.ts\` and ran it through \`tsc\`. Output:

\`\`\`
hello, agentdock
\`\`\`

The file's still in the sandbox — want me to wire it into a script in \`package.json\`?`
      };
    }

    // generic fallback
    return {
      toolEvents: [
        { name: 'shell', args: { cmd: 'pwd && whoami && date' },
          result: { stdout: '/workspace\nagent\nMon Apr 28 14:02:11 UTC 2026\n', stderr:'', exit_code:0, ms: 22 } }
      ],
      reply: `I'm in **/workspace** as \`agent\`. Try one of:\n\n- \`list files in /workspace/openclaw\`\n- \`show package.json\`\n- \`create hello.ts and run it\``
    };
  }
};

async function fetchHealth() {
  try {
    const r = await fetch('./health', { cache: 'no-store' });
    if (!r.ok) throw new Error(r.status);
    return await r.json();
  } catch { return MOCK.health; }
}

async function postChat(messages) {
  // Try real backend; fall back to mock with a small synthetic delay.
  try {
    const r = await fetch('./api/chat', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ messages, model: state.model })
    });
    if (!r.ok) {
      const text = await r.text().catch(()=>'(no body)');
      throw Object.assign(new Error(`${r.status} ${r.statusText}`), { payload: text });
    }
    return await r.json();
  } catch (e) {
    if (e.payload !== undefined) throw e;
    // network/missing endpoint → mocked response
    await sleep(180 + Math.random()*220);
    const r = MOCK.responder(messages);
    return { reply: r.reply, messages: [...messages, { role:'assistant', content: r.reply }], toolEvents: r.toolEvents };
  }
}

const sleep = ms => new Promise(r => setTimeout(r, ms));

function renderCodeBlock(code, lang) {
  const lines = code.split('\n');
  const wrap = el('pre', { class: 'code hljs' });
  let highlighted = '';
  try {
    highlighted = lang && hljs.getLanguage(lang)
      ? hljs.highlight(code, {language: lang}).value
      : hljs.highlightAuto(code).value;
  } catch { highlighted = escHtml(code); }
  // Inject line numbers
  const hLines = highlighted.split('\n');
  wrap.innerHTML = hLines.map((line,i) =>
    `<span class="ln">${i+1}</span>${line}`
  ).join('\n');
  return wrap;
}

function renderDiff(before, after) {
  // Tiny LCS-free diff: line-by-line, mark adds/dels by position.
  // Good enough for demo; backend will replace with real diff.
  const a = before.split('\n');
  const b = after.split('\n');
  const wrap = el('div', { class: 'diff hljs' });
  wrap.append(el('div', { class: 'hunk' }, `@@ -1,${a.length} +1,${b.length} @@`));
  const max = Math.max(a.length, b.length);
  let an = 0, bn = 0;
  for (let i = 0; i < max; i++) {
    const av = a[i], bv = b[i];
    if (av !== undefined && bv !== undefined && av === bv) {
      wrap.append(rowEl(' ', ++an, av, 'ctx'));
      bn++;
    } else {
      if (av !== undefined) wrap.append(rowEl('-', ++an, av, 'del'));
      if (bv !== undefined) wrap.append(rowEl('+', ++bn, bv, 'add'));
    }
  }
  return wrap;
  function rowEl(sign, n, text, klass) {
    return el('div', { class: 'row ' + klass },
      el('span', { class: 'gut' }, String(n)),
      el('span', {}, sign + ' ' + text)
    );
  }
}

function renderLive(turn) {
  // turn = { rounds, currentRound, events:[{kind, ...}], thinking }
  const wrap = el('div', { class: 'turn full' });
  wrap.append(el('div', { class: 'role' },
    el('span', { class: 'who' }, 'agent'),
    el('span', { class: 'time' }, fmtTime()),
    el('span', { class: 'spacer' }),
    el('span', { class: 'actions' },
      el('button', { class: 'stop', onclick: stopTurn }, 'stop')
    )
  ));
  const live = el('div', { class: 'live' });
  // header: current round + cumulative tool count
  const toolCount = (turn.events||[]).filter(e => e.kind === 'tool').length;
  const doneCount = (turn.events||[]).filter(e => e.kind === 'tool' && e.status === 'done').length;
  const headerBits = [`round ${Math.max(turn.currentRound, 1)} of ${turn.rounds}`];
  if (toolCount > 0) headerBits.push(`${doneCount}/${toolCount} tools`);
  if (turn.startedAt) headerBits.push(`${Math.round((Date.now() - turn.startedAt)/1000)}s`);
  live.append(el('div', { class: 'live-round' }, headerBits.join(' · ')));

  for (const ev of (turn.events || [])) {
    if (ev.kind === 'round') {
      if (ev.round === 0) continue; // first round header is implicit in the live-round line
      live.append(el('div', { class: 'live-round' }, `round ${ev.round + 1}`));
      continue;
    }
    if (ev.kind === 'text') {
      const txt = (ev.text || '').trim();
      if (!txt) continue;
      live.append(el('div', { class: 'live-text' }, txt));
      continue;
    }
    if (ev.kind === 'tool') {
      live.append(renderLiveTool(ev));
      continue;
    }
  }

  if (turn.thinking) {
    live.append(el('div', { class: 'live-thinking' },
      el('span', { class: 'dot', style: 'width:7px;height:7px;border-radius:50%;background:var(--accent);animation:softPulse 1.4s ease-in-out infinite;display:inline-block' }),
      'thinking…'
    ));
  }
  wrap.append(live);
  return wrap;
}

function renderLiveTool(ev) {
  // Reuse the rich tool card so users can expand to see args + result while
  // the run is still in flight. ev.result is undefined while status==='running'.
  const status = ev.status === 'running' ? 'running' : (ev.result?.exit_code > 0 ? 'error' : 'ok');
  const card = el('div', { class: 'tool', 'data-open': ev.status === 'done' ? 'false' : 'false', 'data-status': status });
  const head = renderToolHead(
    { name: ev.name, args: ev.args, result: ev.status === 'done' ? ev.result : undefined },
    ev.status === 'running' ? 'running' : undefined
  );
  head.addEventListener('click', () => {
    card.dataset.open = card.dataset.open === 'true' ? 'false' : 'true';
  });
  card.append(head);
  if (ev.status === 'done') {
    card.append(renderToolBody({ name: ev.name, args: ev.args, result: ev.result }));
  } else {
    // running — show args only so the user can see what was sent
    const body = el('div', { class: 'tool-body' });
    body.append(el('div', { class: 'tool-section' },
      el('div', { class: 'tool-section-label' }, 'args'),
      el('pre', { class: 'code' }, JSON.stringify(ev.args || {}, null, 2))
    ));
    body.append(el('div', { class: 'tool-section' },
      el('div', { class: 'tool-section-label' }, 'status'),
      el('div', { class: 'meta-row' }, el('span', {}, 'running…'))
    ));
    card.append(body);
  }
  return card;
}

function copyText(e, txt) {
  navigator.clipboard?.writeText(txt);
  const b = e.currentTarget;
  b.dataset.copied = 'true';
  b.textContent = 'copied';
  setTimeout(() => { b.dataset.copied = 'false'; b.textContent = 'copy'; }, 1100);
}

// ---------- thread render ----------
function renderThread() {
  const t = $('#thread');
  t.innerHTML = '';
  if (state.messages.length === 0 && !state.inflight) {
    t.append(renderEmpty());
    return;
  }
  for (const m of state.messages) {
    if (m.role === 'user') t.append(renderUserTurn(m));
    else                   t.append(renderAssistantTurn(m));
  }
  if (state.inflight) t.append(renderLive(state.inflight));
  // scroll to bottom
  requestAnimationFrame(() => { $('#scroll').scrollTop = $('#scroll').scrollHeight; });
}

// ---------- workspace rail ----------
const ROOT = '/workspace';
const fsCache = new Map();   // abs path -> { entries: [{name,isDir,size}] } | { error: string }
const loading = new Set();   // abs paths currently being fetched
const open = new Set([ROOT]);
const touched = {}; // path -> 'r' | 'w'

async function fetchDir(path) {
  if (fsCache.has(path) || loading.has(path)) return;
  loading.add(path);
  try {
    const res = await fetch('/api/fs/list?path=' + encodeURIComponent(path));
    if (!res.ok) {
      const j = await res.json().catch(() => ({}));
      fsCache.set(path, { error: j.error || ('HTTP ' + res.status) });
    } else {
      const data = await res.json();
      fsCache.set(path, { entries: Array.isArray(data.entries) ? data.entries : [] });
    }
  } catch (err) {
    fsCache.set(path, { error: err && err.message ? err.message : String(err) });
  } finally {
    loading.delete(path);
    renderRail();
  }
}

function renderRail() {
  const body = $('#rail-body');
  body.innerHTML = '';
  body.append(renderTreeNode(ROOT, true));
  // touched-this-turn
  const t = Object.entries(touched);
  if (t.length) {
    body.append(el('div', { class: 'tree-section' }, 'touched this turn'));
    const wrap = el('div', { class: 'tree' });
    for (const [path, kind] of t) {
      wrap.append(el('div', { class: 'tree-node tree-file', 'data-touch': kind, onclick: () => openFile(path) },
        el('span', { class: 'tree-caret' }, ''),
        el('span', { class: 'tree-icon' }, kind==='w'?'◆':'●'),
        el('span', { class: 'tree-name' }, path.replace(ROOT + '/', ''))
      ));
    }
    body.append(wrap);
  }
}

function renderTreeNode(path, isDir) {
  const name = path.split('/').pop() || path;

  if (!isDir) {
    return el('div', { class: 'tree-node tree-file', 'data-touch': touched[path]||'', onclick: () => openFile(path) },
      el('span', { class: 'tree-caret' }, ''),
      el('span', { class: 'tree-icon' }, '·'),
      el('span', { class: 'tree-name' }, name || path)
    );
  }

  const opened = open.has(path);
  const wrap = el('div', {});
  const head = el('div', { class: 'tree-node', onclick: () => {
    if (opened) open.delete(path); else { open.add(path); if (!fsCache.has(path)) fetchDir(path); }
    renderRail();
  }},
    el('span', { class: 'tree-caret' }, opened ? '▾' : '▸'),
    el('span', { class: 'tree-icon' }, '▣'),
    el('span', { class: 'tree-name' }, (path === ROOT ? (name || 'workspace') : name) + '/')
  );
  wrap.append(head);

  if (opened) {
    const kids = el('div', { class: 'tree-children' });
    if (!fsCache.has(path)) {
      if (!loading.has(path)) fetchDir(path);
      kids.append(el('div', { class: 'tree-node tree-loading' },
        el('span', { class: 'tree-caret' }, ''),
        el('span', { class: 'tree-icon' }, '·'),
        el('span', { class: 'tree-name' }, 'loading…')
      ));
    } else {
      const entry = fsCache.get(path);
      if (entry.error) {
        kids.append(el('div', { class: 'tree-node tree-error' },
          el('span', { class: 'tree-caret' }, ''),
          el('span', { class: 'tree-icon' }, '!'),
          el('span', { class: 'tree-name' }, entry.error)
        ));
      } else {
        for (const child of entry.entries) {
          const childPath = path === '/' ? `/${child.name}` : `${path}/${child.name}`;
          kids.append(renderTreeNode(childPath, !!child.isDir));
        }
        if (entry.entries.length === 0) {
          kids.append(el('div', { class: 'tree-node tree-loading' },
            el('span', { class: 'tree-caret' }, ''),
            el('span', { class: 'tree-icon' }, '·'),
            el('span', { class: 'tree-name' }, '(empty)')
          ));
        }
      }
    }
    wrap.append(kids);
  }
  return wrap;
}

// ---------- send / turn lifecycle ----------
async function send() {
  const input = $('#input');
  const text = input.value.trim();
  if (!text || state.inflight) return;
  const userMsg = { role:'user', content:text, time: fmtTime() };
  state.messages.push(userMsg);
  state.tokens += Math.ceil(text.length / 4);
  input.value = '';
  autosize();
  $('#send').disabled = true;
  // start inflight — populated by streaming events from /api/chat/stream
  state.inflight = {
    rounds: 12,
    currentRound: 0,
    events: [],          // chronological: {kind:'round'|'text'|'tool', ...}
    toolsById: {},       // for fast tool_done lookup
    thinking: true,
    startedAt: Date.now(),
    finalData: null
  };
  renderThread();

  let usedStream = false;
  try {
    try {
      await streamChat(state.messages, state.model, (event) => {
        usedStream = true;
        applyStreamEvent(event);
        renderThread();
        renderRail();
      });
    } catch (e) {
      if (usedStream) throw e;
      // streaming endpoint missing or unreachable — degrade to mocked animation
      // so the static page still feels alive when served without a backend
      const peek = MOCK.responder(state.messages);
      const evts = state.inflight.events;
      evts.push({ kind:'round', round: 0 });
      for (let i = 0; i < peek.toolEvents.length; i++) {
        const t = peek.toolEvents[i];
        const tid = `mock-${i}`;
        const entry = { kind:'tool', round: 0, id: tid, name: t.name, args: t.args, status: 'running' };
        evts.push(entry);
        state.inflight.toolsById[tid] = entry;
        renderThread();
        await sleep(280 + Math.random()*350);
        entry.status = 'done';
        entry.ms = t.result?.ms ?? Math.floor(Math.random()*180)+20;
        entry.result = t.result;
        if (t.name === 'read_file')  touched[t.args.path] = 'r';
        if (t.name === 'write_file') touched[t.args.path] = 'w';
        renderThread();
        renderRail();
      }
      state.inflight.finalData = { reply: peek.reply, toolEvents: peek.toolEvents };
    }

    const f = state.inflight.finalData;
    if (f) {
      state.messages.push({
        role: 'assistant',
        content: f.reply || '',
        time: fmtTime(),
        tools: f.toolEvents || []
      });
      state.tokens += Math.ceil((f.reply||'').length / 4);
    }
  } catch (e) {
    showBanner(e.message || 'Request failed', e.payload);
  } finally {
    state.inflight = null;
    $('#send').disabled = !$('#input').value.trim();
    renderMeter();
    renderThread();
  }
}

async function streamChat(messages, model, onEvent) {
  let r;
  try {
    r = await fetch('./api/chat/stream', {
      method: 'POST',
      headers: { 'content-type': 'application/json', 'accept': 'application/x-ndjson' },
      body: JSON.stringify({ messages, model })
    });
  } catch (e) {
    // network-level failure — let caller fall back to mock
    throw Object.assign(new Error(e.message || 'network error'), { network: true });
  }
  if (!r.ok) {
    const text = await r.text().catch(()=>'(no body)');
    throw Object.assign(new Error(`${r.status} ${r.statusText}`), { payload: text });
  }
  if (!r.body) {
    throw new Error('streaming response has no body');
  }
  const reader = r.body.getReader();
  const decoder = new TextDecoder();
  let buf = '';
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buf += decoder.decode(value, { stream: true });
    let idx;
    while ((idx = buf.indexOf('\n')) !== -1) {
      const line = buf.slice(0, idx).trim();
      buf = buf.slice(idx + 1);
      if (!line) continue;
      let event;
      try { event = JSON.parse(line); } catch { continue; }
      onEvent(event);
    }
  }
  const tail = buf.trim();
  if (tail) {
    try { onEvent(JSON.parse(tail)); } catch {}
  }
}

// Adapt the agent's tool return shapes to what the rich tool cards expect.
// The agent returns `{entries:[{name,isDir,size}]}`, `{content}`, `{ok,bytes}`;
// the renderers were originally written against the mock fixture shapes
// (`type`/`mtime`, `contents`/`size`, `before`/`after`/`size`).
function normalizeToolResult(name, args, result, ms) {
  if (!result || typeof result !== 'object') return { _raw: result, ms };
  if (name === 'shell') {
    return { ...result, ms };
  }
  if (name === 'list_files' && Array.isArray(result.entries)) {
    return {
      entries: result.entries.map(e => ({
        name: e.name,
        type: e.isDir ? 'dir' : 'file',
        size: typeof e.size === 'number' ? e.size : 0,
        mtime: e.mtime || ''
      })),
      ms
    };
  }
  if (name === 'read_file' && typeof result.content === 'string') {
    return {
      contents: result.content,
      size: result.content.length,
      lang: guessLang(args?.path),
      ms
    };
  }
  if (name === 'write_file') {
    return {
      after: typeof args?.content === 'string' ? args.content : '',
      before: '',
      size: typeof result.bytes === 'number' ? result.bytes : 0,
      lang: guessLang(args?.path),
      ms
    };
  }
  return { ...result, ms };
}

function guessLang(path) {
  if (!path || typeof path !== 'string') return 'plaintext';
  const ext = path.split('.').pop()?.toLowerCase() || '';
  const map = {
    ts:'typescript', tsx:'typescript', js:'javascript', jsx:'javascript',
    json:'json', md:'markdown', html:'xml', css:'css', sh:'bash',
    py:'python', go:'go', rs:'rust', yml:'yaml', yaml:'yaml', toml:'ini',
    txt:'plaintext'
  };
  return map[ext] || 'plaintext';
}

function applyStreamEvent(event) {
  const turn = state.inflight;
  if (!turn) return;
  switch (event.type) {
    case 'start':
      if (event.maxRounds) turn.rounds = event.maxRounds;
      break;
    case 'round_start':
      turn.currentRound = (event.round | 0) + 1;
      turn.events.push({ kind: 'round', round: event.round | 0 });
      turn.thinking = false;
      break;
    case 'model_call':
      turn.thinking = true;
      break;
    case 'model_text':
      turn.thinking = false;
      turn.events.push({ kind: 'text', round: event.round | 0, text: event.text || '' });
      break;
    case 'tool_start': {
      turn.thinking = false;
      const entry = {
        kind: 'tool',
        round: event.round | 0,
        id: event.id,
        name: event.name,
        args: event.args || {},
        status: 'running',
        startedAt: Date.now()
      };
      turn.events.push(entry);
      turn.toolsById[event.id] = entry;
      break;
    }
    case 'tool_done': {
      const entry = turn.toolsById[event.id];
      if (entry) {
        entry.status = 'done';
        entry.ms = event.ms;
        entry.result = normalizeToolResult(entry.name, entry.args, event.result, event.ms);
        if (entry.name === 'read_file' && entry.args?.path) touched[entry.args.path] = 'r';
        if (entry.name === 'write_file' && entry.args?.path) touched[entry.args.path] = 'w';
      }
      turn.thinking = true; // waiting for next model call
      break;
    }
    case 'max_rounds':
      turn.thinking = false;
      break;
    case 'final':
      turn.thinking = false;
      turn.finalData = {
        reply: event.reply || '',
        toolEvents: (event.toolEvents || []).map(t => ({
          name: t.name,
          args: t.args,
          ms: t.ms,
          result: normalizeToolResult(t.name, t.args, t.result, t.ms)
        }))
      };
      break;
    case 'error':
      throw Object.assign(new Error(event.message || 'agent error'), { payload: event.stack });
  }
}

function stopTurn() {
  state.inflight = null;
  renderThread();
}

// ---------- banner ----------
function showBanner(msg, payload) {
  if (state.banner) state.banner.remove();
  const b = el('div', { class: 'banner', 'data-open':'false' },
    el('div', { class: 'banner-row' },
      el('span', { class: 'banner-msg' }, '⚠ ' + msg),
      el('span', { class: 'banner-actions' },
        payload ? el('button', { onclick: () => b.dataset.open = b.dataset.open==='true'?'false':'true' }, 'details') : null,
        el('button', { onclick: () => b.remove() }, 'dismiss')
      )
    ),
    payload ? el('pre', {}, typeof payload === 'string' ? payload : JSON.stringify(payload,null,2)) : null
  );
  document.body.append(b);
  state.banner = b;
}

// ---------- composer ----------
function autosize() {
  const ta = $('#input');
  ta.style.height = 'auto';
  ta.style.height = Math.min(240, ta.scrollHeight) + 'px';
  $('#send').disabled = !ta.value.trim() || !!state.inflight;
}
function bindComposer() {
  const ta = $('#input');
  ta.addEventListener('input', autosize);
  ta.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey && !e.metaKey && !e.ctrlKey) { e.preventDefault(); send(); }
  });
  $('#send').addEventListener('click', send);
}
function renderMeter() {
  const pct = Math.min(100, (state.tokens / state.tokenBudget) * 100);
  $('#meter-fill').style.width = pct + '%';
  $('#meter-num').textContent = `${formatTokens(state.tokens)} / ${formatTokens(state.tokenBudget)}`;
}
function formatTokens(n) {
  if (n < 1000) return String(n);
  if (n < 1_000_000) return (n/1000).toFixed(n<10000?1:0) + 'k';
  return (n/1_000_000).toFixed(1)+'m';
}

// ---------- tweaks ----------
function bindTweaks() {
  const open = ()  => $('#tweaks').dataset.open = 'true';
  const close = () => $('#tweaks').dataset.open = 'false';
  $('#tweaks-fab').addEventListener('click', () => {
    $('#tweaks').dataset.open = $('#tweaks').dataset.open === 'true' ? 'false' : 'true';
  });
  $('#tweaks-close').addEventListener('click', close);

  const ws = $('#t-ws');
  ws.addEventListener('click', () => {
    state.tweaks.workspace = !state.tweaks.workspace;
    ws.dataset.on = state.tweaks.workspace;
    $('#t-ws-v').textContent = state.tweaks.workspace ? 'on' : 'off';
    $('#app').dataset.workspace = state.tweaks.workspace ? 'on' : 'off';
    if (state.tweaks.workspace) renderRail();
  });

  const read = $('#t-read');
  read.addEventListener('input', () => {
    const v = +read.value;
    state.tweaks.read = v;
    document.documentElement.style.setProperty('--read', v + 'ch');
    $('#t-read-v').textContent = v + 'ch';
  });

  $$('#t-mono button').forEach(b => b.addEventListener('click', () => {
    $$('#t-mono button').forEach(x => x.dataset.active = 'false');
    b.dataset.active = 'true';
    state.tweaks.mono = b.dataset.val;
    document.documentElement.style.setProperty('--mono',
      `'${b.dataset.val}', ui-monospace, SFMono-Regular, Menlo, monospace`);
  }));
}

// ---------- theme ----------
function bindTheme() {
  $('#theme-toggle').addEventListener('click', () => {
    const cur = document.documentElement.dataset.theme;
    document.documentElement.dataset.theme = cur === 'dark' ? 'light' : 'dark';
  });
}

// ---------- shortcuts ----------
function bindShortcuts() {
  document.addEventListener('keydown', e => {
    if (e.key === '/' && document.activeElement !== $('#input')) {
      e.preventDefault();
      $('#input').focus();
    }
    if ((e.metaKey || e.ctrlKey) && e.key === ',') {
      e.preventDefault();
      $('#tweaks').dataset.open = $('#tweaks').dataset.open === 'true' ? 'false' : 'true';
    }
    if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'n' && e.shiftKey) {
      e.preventDefault();
      newChat();
    }
    if (e.key === 'Escape' && $('#main').dataset.tab === 'file' && document.activeElement !== $('#input')) {
      closeFileTab();
    }
  });
  $('#new-chat').addEventListener('click', newChat);
}

function bindTabbar() {
  $('#tab-chat').addEventListener('click', () => setActiveTab('chat'));
  $('#tab-file').addEventListener('click', (e) => {
    if (e.target && e.target.id === 'tab-file-close') return;
    setActiveTab('file');
  });
  $('#tab-file-close').addEventListener('click', (e) => {
    e.stopPropagation();
    closeFileTab();
  });
  $('#rail-refresh').addEventListener('click', () => {
    fsCache.clear();
    loading.clear();
    fetchDir(ROOT);
    renderRail();
  });
}
function newChat() {
  state.messages = [];
  state.inflight = null;
  state.tokens = 0;
  for (const k of Object.keys(touched)) delete touched[k];
  renderThread();
  renderMeter();
  renderRail();
  $('#input').focus();
}

// ---------- demo seed: multi-turn explore → edit → run ----------
function seedDemo() {
  // Pre-baked transcript so the page lands on a meaningful state.
  const t1 = MOCK.responder([{role:'user', content:'list files in /workspace/openclaw'}]);
  const t2 = MOCK.responder([{role:'user', content:'show package.json'}]);
  const t3 = MOCK.responder([{role:'user', content:'create hello.ts and run it'}]);
  state.messages = [
    { role:'user', content:'list files in /workspace/openclaw', time:'14:01' },
    { role:'assistant', content: t1.reply, time:'14:01', tools: t1.toolEvents },
    { role:'user', content:'show package.json and tell me which scripts I have', time:'14:02' },
    { role:'assistant', content: t2.reply, time:'14:02', tools: t2.toolEvents },
    { role:'user', content:'create hello.ts and run it', time:'14:03' },
    { role:'assistant', content: t3.reply, time:'14:03', tools: t3.toolEvents },
  ];
  // Reflect filesystem touches in the rail
  touched['/workspace/openclaw/package.json'] = 'r';
  touched['/workspace/openclaw/hello.ts']     = 'w';
  state.tokens = 4_200;
  // Auto-expand the read_file in the second turn so a user landing on the
  // demo sees what an expanded card looks like.
  setTimeout(() => {
    const cards = $$('.tool');
    if (cards[2]) cards[2].dataset.open = 'true';
  }, 150);
}

// ---------- init ----------
async function init() {
  bindComposer();
  bindTheme();
  bindShortcuts();
  bindTweaks();
  bindTabbar();
  // Health
  const h = await fetchHealth();
  state.model = h.model || state.model;
  state.health = h.ok ? 'ready' : 'error';
  renderHeader();
  // Allow ?empty=1 for the empty state
  const params = new URLSearchParams(location.search);
  if (!params.has('empty')) seedDemo();
  renderThread();
  fetchDir(ROOT);
  renderRail();
  renderMeter();
}
init();
</script>
